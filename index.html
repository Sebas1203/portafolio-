<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Agrafagem</title>
  <link rel="stylesheet" href="style.css">
  <script src="backend/script.js" defer></script>
</head>

<body>

<div class="container">

  <aside class="sidebar">

    <img src="imagenes/lear_logo.png" alt="Logo da empresa" width="300" height="200">
    <h1>AGRAFAGEM</h1>

    <input type="text" id="cartao" placeholder="Passar cartão">
    <input type="text" id="etiqueta" placeholder="Ler etiqueta">

    <h2>Linha 1000</h2>
    <button class="green" onclick="accion('ENTRAR', 'M1', '1000')">ENTRAR M1</button>

    <button class="red" onclick="accion('SAIR', 'M1', '1000')">SAIR M1</button>

    <button class="green" onclick="accion('ENTRAR', 'M2', '1000')">ENTRAR M2</button>
    <button class="red" onclick="accion('SAIR', 'M2', '1000')">SAIR M2</button>

    <h2>Linha 2000</h2>
    <button class="green" onclick="accion('ENTRAR', 'MR2', '2000')">ENTRAR MR2</button>
    <button class="red" onclick="accion('SAIR', 'MR2', '2000')">SAIR MR2</button>

    <button class="admin-btn bottom-btn" onclick="abrirModal()">
      Gestão de colaboradores
    </button>

<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>Gestão de Colaboradores</h2>

    <div class="modal-form">
      <input type="text" id="novo-cartao" placeholder="Nº Cartão">
      <input type="text" id="novo-nome" placeholder="Nome">
      <select id="novo-rol">
        <option value="">-- Selecionar rol --</option>
        <option value="JEFE">JEFE</option>
        <option value="LIDER">LIDER</option>
        <option value="REWORK">REWORK</option>
        <option value="OPERADOR">OPERADOR</option>
      </select>
      <button class="green" onclick="adicionarColaborador()">Adicionar</button>
    </div>
    

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nº Cartão</th>
          <th>Nome</th>
          <th>Rol</th>
          <th>Remover</th>
        </tr>
      </thead>
      <tbody id="lista-colaboradores"></tbody>
    </table>

    <button class="red" onclick="fecharModal()">Fechar</button>
  </div>
</div>

  </aside>

  <main class="content">

    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Hora entrada</th>
          <th>Hora saída</th>
          <th>N etiqueta</th>
          <th>N Cartão</th>
          <th>Tipo</th>
        </tr>
      </thead>

      <tbody id="tabela">
      </tbody>
    </table>

  </main>

</div>

</body>
</html>
